<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win16 Development Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 10px;
        }
        
        .container {
            display: flex;
            gap: 10px;
            height: 100vh;
        }
        
        .emulator {
            flex: 1;
            border: 2px solid #333;
            background: #000;
        }
        
        .controls {
            width: 250px;
            background: #2a2a2a;
            border: 2px solid #333;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        
        .controls h2 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .controls p {
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 10px;
            color: #aaa;
        }
        
        button {
            padding: 8px 12px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #0052a3;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        input[type="file"] {
            font-size: 12px;
            padding: 5px;
        }
        
        .status {
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 3px;
            font-size: 11px;
            min-height: 40px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #0f0;
            font-family: monospace;
        }
        
        .section {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }
        
        .section:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emulator" id="dos"></div>
        <div class="controls">
            <div class="section">
                <h2>Win16 Dev</h2>
                <p>Borland C++ 4.0 in Windows 3.1</p>
            </div>
            
            <div class="section">
                <h2>Import Files</h2>
                <p>Upload a ZIP with your source files (.c, .h, etc.)</p>
                <input type="file" id="uploadZip" accept=".zip" />
                <button onclick="importFiles()">Import ZIP</button>
            </div>
            
            <div class="section">
                <h2>Export Files</h2>
                <p>Download compiled binaries and source from C:\EXPORT\</p>
                <button id="exportBtn" onclick="exportFiles()" disabled>Export ZIP</button>
            </div>
            
            <div class="section">
                <h2>Status</h2>
                <div class="status" id="status">Initializing...</div>
            </div>
        </div>
    </div>

    <script>
        let dosInstance = null;
        const statusEl = document.getElementById('status');
        const exportBtn = document.getElementById('exportBtn');
        
        function log(msg) {
            console.log(msg);
            statusEl.textContent += '\n' + msg;
            statusEl.scrollTop = statusEl.scrollHeight;
        }
        
        function setStatus(msg) {
            console.log(msg);
            statusEl.textContent = msg;
            statusEl.scrollTop = statusEl.scrollHeight;
        }
        
        async function downloadAndReassemble() {
            setStatus('Downloading disk image parts...');
            
            try {
                setStatus('Fetching part 1...');
                const response1 = await fetch('win31.img.gz.aa');
                if (!response1.ok) {
                    setStatus('Error: Failed to fetch win31.img.gz.aa (HTTP ' + response1.status + ')');
                    return;
                }
                const part1Bytes = new Uint8Array(await response1.arrayBuffer());
                setStatus('Part 1 fetched (' + (part1Bytes.length / 1024 / 1024).toFixed(2) + ' MB)');

                setStatus('Fetching part 2...');
                const response2 = await fetch('win31.img.gz.ab');
                if (!response2.ok) {
                    setStatus('Error: Failed to fetch win31.img.gz.ab (HTTP ' + response2.status + ')');
                    return;
                }
                const part2Bytes = new Uint8Array(await response2.arrayBuffer());
                setStatus('Part 2 fetched (' + (part2Bytes.length / 1024 / 1024).toFixed(2) + ' MB)');

                setStatus('Reassembling compressed image...');
                const combined = new Uint8Array(part1Bytes.length + part2Bytes.length);
                combined.set(part1Bytes, 0);
                combined.set(part2Bytes, part1Bytes.length);
                setStatus('Image reassembled (' + (combined.length / 1024 / 1024).toFixed(2) + ' MB)');

                // Verify gzip header
                console.log('First 4 bytes (hex):', Array.from(combined.slice(0, 4)).map(b => b.toString(16).padStart(2, '0')).join(' '));
                if (combined[0] !== 0x1f || combined[1] !== 0x8b) {
                    setStatus('ERROR: Invalid gzip header. Expected 1f 8b, got ' + combined[0].toString(16) + ' ' + combined[1].toString(16));
                    return;
                }
                
                setStatus('Decompressing (this may take a minute)...');
                console.log('pako object:', typeof pako);
                console.log('pako.inflate:', typeof pako.inflate);
                console.log('combined buffer type:', combined.constructor.name);
                console.log('combined size:', combined.length);
                
                if (typeof pako === 'undefined' || typeof pako.inflate !== 'function') {
                    setStatus('ERROR: pako library not loaded or inflate not available');
                    return;
                }
                
                let decompressed;
                try {
                    console.log('Calling pako.inflate...');
                    decompressed = pako.inflate(combined);
                    console.log('Decompression succeeded, result size:', decompressed.length);
                } catch (pakoErr) {
                    setStatus('Pako error: ' + pakoErr.message);
                    console.error('Pako threw:', pakoErr);
                    return;
                }
                
                setStatus('Decompression complete (' + (decompressed.length / 1024 / 1024).toFixed(2) + ' MB)');
                
                const blob = new Blob([decompressed], { type: 'application/octet-stream' });
                const imageUrl = URL.createObjectURL(blob);
                
                setStatus('Image blob created, size: ' + (blob.size / 1024 / 1024).toFixed(2) + ' MB\nInitializing emulator...');
                
                // Small delay to let the browser breathe
                await new Promise(resolve => setTimeout(resolve, 500));
                
                setStatus('Booting Windows 3.1...');
                
                // Wrap Dos() call with explicit error handling
                try {
                    console.log('Dos object:', typeof Dos);
                    if (typeof Dos === 'undefined') {
                        setStatus('ERROR: Dos object not found. js-dos library failed to load.');
                        return;
                    }
                    
                    Dos(document.getElementById('dos'), {
                        url: imageUrl,
                        onRun: (ci) => {
                            dosInstance = ci;
                            setStatus('✓ Windows 3.1 booted. Ready for work.');
                            exportBtn.disabled = false;
                        },
                        onError: (error) => {
                            setStatus('DOS runtime error: ' + (error.message || JSON.stringify(error)));
                            console.error('DOS error object:', error);
                        }
                    });
                } catch (dosErr) {
                    setStatus('Dos() initialization threw: ' + dosErr.message + '\n' + dosErr.stack);
                    console.error('Dos() error:', dosErr);
                }
                
            } catch (err) {
                setStatus('Error: ' + (err.message || 'Unknown error') + '\nStack: ' + (err.stack || 'N/A'));
                console.error('Outer error:', err);
            }
        }
        
        async function importFiles() {
            const fileInput = document.getElementById('uploadZip');
            const file = fileInput.files[0];
            
            if (!file) {
                setStatus('No file selected.');
                return;
            }
            
            setStatus('Reading ZIP...');
            
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                
                let fileCount = 0;
                
                for (const [path, zipEntry] of Object.entries(contents.files)) {
                    if (zipEntry.dir) continue;
                    fileCount++;
                }
                
                setStatus(`Imported ${fileCount} files.\nManual import required in DOS session.`);
                fileInput.value = '';
            } catch (err) {
                setStatus('Import error: ' + err.message);
            }
        }
        
        async function exportFiles() {
            setStatus('Export feature requires custom implementation.\nSee README for manual export instructions.');
        }
        
        window.addEventListener('load', downloadAndReassemble);
    </script>
</body>
</html>

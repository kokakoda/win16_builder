<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win16 Development Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <script>
        let XZ;
        async function initXZ() {
            const xzModule = await import('https://cdn.jsdelivr.net/npm/xz-wasm@1.0.0/dist/index.min.js');
            XZ = xzModule;
        }
        initXZ();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 10px;
        }
        
        .container {
            display: flex;
            gap: 10px;
            height: 100vh;
        }
        
        .emulator {
            flex: 1;
            border: 2px solid #333;
            background: #000;
        }
        
        .controls {
            width: 250px;
            background: #2a2a2a;
            border: 2px solid #333;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        
        .controls h2 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .controls p {
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 10px;
            color: #aaa;
        }
        
        button {
            padding: 8px 12px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #0052a3;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        input[type="file"] {
            font-size: 12px;
            padding: 5px;
        }
        
        .status {
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 3px;
            font-size: 11px;
            min-height: 40px;
            white-space: pre-wrap;
            word-break: break-word;
            color: #0f0;
            font-family: monospace;
        }
        
        .section {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }
        
        .section:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emulator" id="dos"></div>
        <div class="controls">
            <div class="section">
                <h2>Win16 Dev</h2>
                <p>Borland C++ 4.0 in Windows 3.1</p>
            </div>
            
            <div class="section">
                <h2>Import Files</h2>
                <p>Upload a ZIP with your source files (.c, .h, etc.)</p>
                <input type="file" id="uploadZip" accept=".zip" />
                <button onclick="importFiles()">Import ZIP</button>
            </div>
            
            <div class="section">
                <h2>Export Files</h2>
                <p>Download compiled binaries and source from C:\EXPORT\</p>
                <button id="exportBtn" onclick="exportFiles()" disabled>Export ZIP</button>
            </div>
            
            <div class="section">
                <h2>Status</h2>
                <div class="status" id="status">Initializing...</div>
            </div>
        </div>
    </div>

    <script>
        let dosInstance = null;
        const statusEl = document.getElementById('status');
        const exportBtn = document.getElementById('exportBtn');
        
        function log(msg) {
            console.log(msg);
            statusEl.textContent += '\n' + msg;
            statusEl.scrollTop = statusEl.scrollHeight;
        }
        
        function setStatus(msg) {
            console.log(msg);
            statusEl.textContent = msg;
            statusEl.scrollTop = statusEl.scrollHeight;
        }
        
        async function downloadAndReassemble() {
            setStatus('Downloading disk image parts...');
            
            try {
                // Wait for XZ to be initialized
                setStatus('Waiting for XZ library...');
                let xzWaitCount = 0;
                while (!XZ && xzWaitCount < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    xzWaitCount++;
                }
                
                if (!XZ) {
                    setStatus('Error: XZ library failed to load');
                    return;
                }
                
                setStatus('XZ library ready. Fetching part 1...');
                const response1 = await fetch('win31.img.xz.aa');
                if (!response1.ok) {
                    setStatus('Error: Failed to fetch win31.img.xz.aa (HTTP ' + response1.status + ')');
                    return;
                }
                const part1Compressed = await response1.arrayBuffer();
                setStatus('Part 1 fetched (' + (part1Compressed.byteLength / 1024 / 1024).toFixed(2) + ' MB)');
                
                setStatus('Fetching part 2...');
                const response2 = await fetch('win31.img.xz.ab');
                if (!response2.ok) {
                    setStatus('Error: Failed to fetch win31.img.xz.ab (HTTP ' + response2.status + ')');
                    return;
                }
                const part2Compressed = await response2.arrayBuffer();
                setStatus('Part 2 fetched (' + (part2Compressed.byteLength / 1024 / 1024).toFixed(2) + ' MB)');
                
                setStatus('Decompressing part 1...');
                const part1 = await XZ.decompress(new Uint8Array(part1Compressed));
                setStatus('Part 1 decompressed (' + (part1.length / 1024 / 1024).toFixed(2) + ' MB)');
                
                setStatus('Decompressing part 2...');
                const part2 = await XZ.decompress(new Uint8Array(part2Compressed));
                setStatus('Part 2 decompressed (' + (part2.length / 1024 / 1024).toFixed(2) + ' MB)');
                
                setStatus('Reassembling image...');
                const combined = new Uint8Array(part1.length + part2.length);
                combined.set(part1, 0);
                combined.set(part2, part1.length);
                setStatus('Image reassembled (' + (combined.length / 1024 / 1024).toFixed(2) + ' MB)');
                
                const blob = new Blob([combined], { type: 'application/octet-stream' });
                const imageUrl = URL.createObjectURL(blob);
                
                setStatus('Booting Windows 3.1...');
                
                Dos.run(imageUrl, {
                    onRun: (dos) => {
                        dosInstance = dos;
                        setStatus('Windows 3.1 booted. Ready for import/export.');
                        exportBtn.disabled = false;
                    },
                    onError: (error) => {
                        setStatus('Dos.run error: ' + error);
                    }
                });
                
            } catch (err) {
                setStatus('Error: ' + err.message + '\n' + err.stack);
            }
        }
        
        async function importFiles() {
            const fileInput = document.getElementById('uploadZip');
            const file = fileInput.files[0];
            
            if (!file) {
                setStatus('No file selected.');
                return;
            }
            
            setStatus('Reading ZIP...');
            
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                
                await dosInstance.run('mkdir C:\\IMPORT');
                
                let fileCount = 0;
                
                for (const [path, zipEntry] of Object.entries(contents.files)) {
                    if (zipEntry.dir) continue;
                    
                    const data = await zipEntry.async('arraybuffer');
                    const filename = path.split('/').pop();
                    
                    await dosInstance.run(`echo Importing ${filename}...`);
                    
                    fileCount++;
                }
                
                setStatus(`Imported ${fileCount} files to C:\\IMPORT\\\nOpen File Manager in Win3.1 to access them.`);
                fileInput.value = '';
            } catch (err) {
                setStatus('Import error: ' + err.message);
            }
        }
        
        async function exportFiles() {
            setStatus('Export feature requires custom implementation.\nSee README for manual export instructions.');
        }
    </script>

    <script src="https://js-dos.com/cdn/js-dos.js"></script>
    <script>
        window.addEventListener('load', downloadAndReassemble);
    </script>
</body>
</html>

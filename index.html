<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win16 Development Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

        :root {
            --bg:        #0d0d0f;
            --surface:   #141418;
            --border:    #2a2a35;
            --accent:    #00d4a0;
            --accent2:   #005fff;
            --warn:      #ffb300;
            --text:      #d8d8e0;
            --muted:     #5a5a6e;
            --mono:      'IBM Plex Mono', monospace;
            --sans:      'IBM Plex Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            height: 40px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }
        .topbar-logo {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.05em;
        }
        .topbar-logo span { color: var(--muted); font-weight: 400; }
        .topbar-sep { flex: 1; }
        .topbar-badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--muted);
        }

        /* ── layout ── */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── emulator pane ── */
        #dos {
            flex: 1;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        /* boot overlay */
        #boot-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            transition: opacity 0.6s ease;
        }
        #boot-overlay.hidden { opacity: 0; pointer-events: none; }
        .boot-title {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .boot-progress-wrap {
            width: 280px;
        }
        .boot-progress-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .boot-progress-bar {
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
        }
        .boot-progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 1px;
        }
        .boot-log {
            font-family: var(--mono);
            font-size: 10px;
            color: #3a3a50;
            text-align: center;
            max-width: 320px;
            line-height: 1.6;
            min-height: 32px;
        }
        .boot-log .active { color: var(--accent); }

        /* ── sidebar ── */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .panel {
            border-bottom: 1px solid var(--border);
            padding: 14px;
        }
        .panel-title {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .panel p {
            font-size: 11px;
            line-height: 1.6;
            color: var(--muted);
            margin-bottom: 10px;
        }

        /* file drop zone */
        .drop-zone {
            border: 1px dashed var(--border);
            border-radius: 3px;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 8px;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(0,212,160,0.04);
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .drop-zone-icon {
            font-size: 18px;
            margin-bottom: 4px;
            display: block;
        }
        .drop-zone-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
        }

        /* buttons */
        .btn {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: 2px;
            background: transparent;
            color: var(--text);
            font-family: var(--mono);
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .btn:last-child { margin-bottom: 0; }
        .btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.04);
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .btn-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }
        .btn-dot.warn { background: var(--warn); }

        /* status terminal */
        .status-terminal {
            font-family: var(--mono);
            font-size: 10px;
            line-height: 1.7;
            color: #3a5a4a;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 10px;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .status-terminal .line-ok  { color: var(--accent); }
        .status-terminal .line-err { color: #ff5555; }
        .status-terminal .line-warn{ color: var(--warn); }
        .status-terminal .line-dim { color: var(--muted); }

        /* imported files list */
        .file-list {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            max-height: 80px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .file-list div {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-list-empty { font-style: italic; color: #2a2a3a; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">WIN16<span>/DEV</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-badge">BC++ 4.0 · Win 3.1 · js-dos v8</div>
</div>

<div class="workspace">
    <div id="dos">
        <div id="boot-overlay">
            <div class="boot-title">Initialising Environment</div>
            <div class="boot-progress-wrap">
                <div class="boot-progress-label">
                    <span id="prog-stage">Standby</span>
                    <span id="prog-pct">0%</span>
                </div>
                <div class="boot-progress-bar">
                    <div class="boot-progress-fill" id="prog-fill"></div>
                </div>
            </div>
            <div class="boot-log" id="boot-log">—</div>
        </div>
    </div>

    <div class="sidebar">

        <div class="panel">
            <div class="panel-title">Import</div>
            <p>Upload a ZIP of source files (.c, .h, .mak…). They will be written into C:\SRC\ on the DOS filesystem.</p>
            <div class="drop-zone" id="dropZone">
                <input type="file" id="uploadZip" accept=".zip" onchange="handleFileSelect(event)">
                <span class="drop-zone-icon">📦</span>
                <span class="drop-zone-label">Drop ZIP or click to browse</span>
            </div>
            <div class="file-list" id="fileList">
                <div class="file-list-empty">No files staged</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Actions</div>
            <button class="btn" id="importBtn" onclick="importFiles()" disabled>
                <span class="btn-dot"></span>Import to C:\SRC\
            </button>
            <button class="btn" id="exportBtn" onclick="exportFiles()" disabled>
                <span class="btn-dot warn"></span>Export C:\EXPORT\
            </button>
        </div>

        <div class="panel" style="flex:1">
            <div class="panel-title">Log</div>
            <div class="status-terminal" id="status"></div>
        </div>

    </div>
</div>

<script>
    // ── state ──────────────────────────────────────────────────────────────
    let dosInstance = null;
    let stagedFiles = {};   // path -> Uint8Array

    const statusEl  = document.getElementById('status');
    const importBtn = document.getElementById('importBtn');
    const exportBtn = document.getElementById('exportBtn');
    const fileList  = document.getElementById('fileList');

    // ── logging ────────────────────────────────────────────────────────────
    function log(msg, cls = '') {
        const line = document.createElement('div');
        if (cls) line.className = 'line-' + cls;
        line.textContent = msg;
        statusEl.appendChild(line);
        statusEl.scrollTop = statusEl.scrollHeight;
        console.log('[win16]', msg);
    }

    // ── boot progress ──────────────────────────────────────────────────────
    function setProgress(stage, pct) {
        document.getElementById('prog-stage').textContent = stage;
        document.getElementById('prog-pct').textContent   = pct + '%';
        document.getElementById('prog-fill').style.width  = pct + '%';
        const bl = document.getElementById('boot-log');
        bl.innerHTML = `<span class="active">${stage}</span>`;
    }

    // ── fetch helpers ──────────────────────────────────────────────────────
    async function fetchPart(url, label, onProgress) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status} fetching ${url}`);
        const total = parseInt(resp.headers.get('Content-Length') || '0');
        const reader = resp.body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            loaded += value.length;
            if (total && onProgress) onProgress(loaded / total);
        }
        const out = new Uint8Array(loaded);
        let off = 0;
        for (const c of chunks) { out.set(c, off); off += c.length; }
        log(`${label}: ${(loaded / 1024 / 1024).toFixed(2)} MB`, 'ok');
        return out;
    }

    // ── main boot ──────────────────────────────────────────────────────────
    async function boot() {
        log('Starting boot sequence…', 'dim');
        try {
            setProgress('Fetching part 1/2', 5);
            const part1 = await fetchPart('win31.img.gz.aa', 'Part 1', p => setProgress('Fetching part 1/2', Math.round(5 + p * 25)));

            setProgress('Fetching part 2/2', 30);
            const part2 = await fetchPart('win31.img.gz.ab', 'Part 2', p => setProgress('Fetching part 2/2', Math.round(30 + p * 20)));

            setProgress('Reassembling', 52);
            const combined = new Uint8Array(part1.length + part2.length);
            combined.set(part1, 0);
            combined.set(part2, part1.length);
            log(`Combined: ${(combined.length / 1024 / 1024).toFixed(2)} MB`);

            if (combined[0] !== 0x1f || combined[1] !== 0x8b)
                throw new Error(`Bad gzip header: ${combined[0].toString(16)} ${combined[1].toString(16)}`);

            setProgress('Decompressing', 55);
            log('Decompressing image (this takes a moment)…', 'dim');
            await new Promise(r => setTimeout(r, 50)); // let paint happen
            const decompressed = pako.inflate(combined);
            log(`Decompressed: ${(decompressed.length / 1024 / 1024).toFixed(2)} MB`, 'ok');

            setProgress('Building bundle', 78);
            log('Wrapping image in .jsdos bundle…', 'dim');

            // ── THE KEY FIX: wrap in a .jsdos bundle zip ──────────────────
            // js-dos v8 requires a zip (the ".jsdos" bundle format) containing
            // at minimum a jsdos.json config file.  Passing a raw disk image
            // directly causes "zip_to_fs: can't open zip archive" + the
            // "Unable to add .jsdos/jsdos.json into bundle.zip" error.
            const jsdosConfig = {
                version: "8",
                emulatorVersion: "8",
                config: [
                    "[dosbox]",
                    "memsize=64",
                    "",
                    "[cpu]",
                    "cputype=486",
                    "cycles=max",
                    "",
                    "[dos]",
                    "xms=true",
                    "ems=true",
                    "umb=true",
                    "",
                    "[sblaster]",
                    "sbtype=sb16",
                    "sbbase=220",
                    "irq=7",
                    "dma=1",
                    "hdma=5",
                    "oplmode=auto",
                    "oplemu=default",
                    "",
                    "[autoexec]",
                    "@echo off",
                    "imgmount c hdd.img",
                    "boot -l c"
                ].join("\n"),
                hardware: {
                    cpu: "386",
                    vgaCard: "svga_s3",
                    machineType: "svga_s3",
                    memSize: 64
                }
            };

            const bundleZip = new JSZip();
            bundleZip.file("jsdos.json", JSON.stringify(jsdosConfig, null, 2));
            // Embed the disk image directly inside the bundle.
            // Note: for very large images you may prefer to serve the image
            // separately and reference it by URL in jsdosConfig; but embedding
            // it here keeps everything self-contained and avoids CORS issues.
            bundleZip.file("hdd.img", decompressed, { binary: true });

            const bundleBytes = await bundleZip.generateAsync({
                type: "uint8array",
                compression: "DEFLATE",
                compressionOptions: { level: 1 }   // speed >> size here
            });

            setProgress('Preparing emulator', 90);
            const bundleBlob = new Blob([bundleBytes], { type: "application/zip" });
            const bundleUrl  = URL.createObjectURL(bundleBlob);
            log(`Bundle ready: ${(bundleBlob.size / 1024 / 1024).toFixed(2)} MB`, 'ok');

            setProgress('Booting DOS', 94);
            log('Handing off to js-dos…', 'dim');
            await new Promise(r => setTimeout(r, 200));

            if (typeof Dos === 'undefined')
                throw new Error('Dos() not found — js-dos CDN load failed');

            Dos(document.getElementById('dos'), {
                url: bundleUrl,
                onRun: (ci) => {
                    dosInstance = ci;
                    setProgress('Running', 100);
                    log('✓ Windows 3.1 is running', 'ok');
                    document.getElementById('boot-overlay').classList.add('hidden');
                    importBtn.disabled = false;
                    exportBtn.disabled = false;
                },
                onError: (err) => {
                    log('DOS runtime error: ' + (err?.message ?? JSON.stringify(err)), 'err');
                    console.error('DOS error:', err);
                }
            });

        } catch (err) {
            log('BOOT FAILED: ' + err.message, 'err');
            console.error(err);
            document.getElementById('boot-log').textContent = '✗ ' + err.message;
        }
    }

    // ── file staging ───────────────────────────────────────────────────────
    async function handleFileSelect(evt) {
        const file = evt.target.files[0];
        if (!file) return;
        await stageZip(file);
    }

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', async e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) await stageZip(file);
    });

    async function stageZip(file) {
        log(`Reading ${file.name}…`, 'dim');
        stagedFiles = {};
        try {
            const zip = await (new JSZip()).loadAsync(file);
            const promises = [];
            zip.forEach((path, entry) => {
                if (!entry.dir) {
                    promises.push(
                        entry.async('uint8array').then(data => { stagedFiles[path] = data; })
                    );
                }
            });
            await Promise.all(promises);
            renderFileList();
            importBtn.disabled = dosInstance === null;
            log(`Staged ${Object.keys(stagedFiles).length} file(s) from ${file.name}`, 'ok');
        } catch (err) {
            log('ZIP read error: ' + err.message, 'err');
        }
    }

    function renderFileList() {
        const paths = Object.keys(stagedFiles);
        if (paths.length === 0) {
            fileList.innerHTML = '<div class="file-list-empty">No files staged</div>';
            return;
        }
        fileList.innerHTML = paths.map(p =>
            `<div title="${p}">· ${p}</div>`
        ).join('');
    }

    // ── import into DOS FS ─────────────────────────────────────────────────
    async function importFiles() {
        if (!dosInstance) { log('Emulator not ready', 'warn'); return; }
        const paths = Object.keys(stagedFiles);
        if (paths.length === 0) { log('No files staged', 'warn'); return; }

        log(`Importing ${paths.length} file(s) to C:\\SRC\\…`, 'dim');
        let ok = 0, fail = 0;
        for (const [path, data] of Object.entries(stagedFiles)) {
            // Normalise to DOS path: forward slashes → backslash, root to C:\SRC\
            const dosPath = 'C:\\SRC\\' + path.replace(/\//g, '\\').replace(/^\\/, '');
            try {
                // js-dos v8 CommandInterface FS API
                await dosInstance.fs.createFile(dosPath, data);
                ok++;
            } catch (err) {
                log(`  ✗ ${path}: ${err.message}`, 'err');
                fail++;
            }
        }
        log(`Import done: ${ok} ok, ${fail} failed`, ok > 0 ? 'ok' : 'err');
    }

    // ── export from DOS FS ─────────────────────────────────────────────────
    async function exportFiles() {
        if (!dosInstance) { log('Emulator not ready', 'warn'); return; }

        log('Reading C:\\EXPORT\\…', 'dim');
        exportBtn.disabled = true;
        try {
            const entries = await dosInstance.fs.readDirectory('C:\\EXPORT');
            if (!entries || entries.length === 0) {
                log('C:\\EXPORT\\ is empty or does not exist', 'warn');
                exportBtn.disabled = false;
                return;
            }

            const zip = new JSZip();
            for (const entry of entries) {
                if (entry.isDirectory) continue;
                const data = await dosInstance.fs.readFile('C:\\EXPORT\\' + entry.name);
                zip.file(entry.name, data);
                log(`  + ${entry.name} (${data.length} bytes)`, 'dim');
            }

            const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = 'win16_export.zip';
            a.click();
            URL.revokeObjectURL(url);
            log(`Exported ${entries.length} file(s) → win16_export.zip`, 'ok');
        } catch (err) {
            log('Export error: ' + err.message, 'err');
            console.error(err);
        }
        exportBtn.disabled = false;
    }

    // ── go ─────────────────────────────────────────────────────────────────
    window.addEventListener('load', boot);
</script>
</body>
</html>

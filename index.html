<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win16 Dev Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
        :root { --bg:#0d0d0f; --surface:#141418; --border:#2a2a35; --accent:#00d4a0; --warn:#ffb300; --text:#d8d8e0; --muted:#5a5a6e; --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--sans); background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        .topbar { display:flex; align-items:center; gap:12px; padding:0 16px; height:40px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
        .topbar-logo { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--accent); }
        .topbar-logo span { color:var(--muted); font-weight:400; }
        .topbar-sep { flex:1; }
        .topbar-badge { font-family:var(--mono); font-size:10px; padding:2px 8px; border:1px solid var(--border); border-radius:2px; color:var(--muted); }
        .workspace { display:flex; flex:1; overflow:hidden; }
        #dos-container { flex:1; background:#000; position:relative; overflow:hidden; }
        #boot-overlay { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:20; transition:opacity 0.5s ease; }
        #boot-overlay.hidden { opacity:0; pointer-events:none; }
        .boot-title { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; }
        .boot-progress-wrap { width:300px; }
        .boot-progress-label { font-family:var(--mono); font-size:10px; color:var(--muted); margin-bottom:6px; display:flex; justify-content:space-between; }
        .boot-progress-bar { height:2px; background:var(--border); border-radius:1px; overflow:hidden; }
        .boot-progress-fill { height:100%; background:var(--accent); width:0%; transition:width 0.3s ease; }
        .boot-log { font-family:var(--mono); font-size:10px; color:var(--muted); text-align:center; max-width:340px; }
        .sidebar { width:240px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
        .panel { border-bottom:1px solid var(--border); padding:14px; }
        .panel-title { font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
        .panel p { font-size:11px; line-height:1.6; color:var(--muted); margin-bottom:10px; }
        .drop-zone { border:1px dashed var(--border); border-radius:3px; padding:14px 10px; text-align:center; cursor:pointer; transition:border-color 0.2s,background 0.2s; margin-bottom:8px; position:relative; }
        .drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent); background:rgba(0,212,160,0.04); }
        .drop-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
        .drop-zone-icon { font-size:18px; margin-bottom:4px; display:block; }
        .drop-zone-label { font-family:var(--mono); font-size:10px; color:var(--muted); }
        .btn { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:2px; background:transparent; color:var(--text); font-family:var(--mono); font-size:11px; cursor:pointer; transition:background 0.15s,border-color 0.15s,color 0.15s; text-align:left; display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .btn:last-child { margin-bottom:0; }
        .btn:hover:not(:disabled) { background:rgba(255,255,255,0.04); border-color:var(--accent); color:var(--accent); }
        .btn:disabled { opacity:0.35; cursor:not-allowed; }
        .btn-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
        .btn-dot.warn { background:var(--warn); }
        .status-terminal { font-family:var(--mono); font-size:10px; line-height:1.7; background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:10px; min-height:80px; max-height:200px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
        .status-terminal .ok   { color:var(--accent); }
        .status-terminal .err  { color:#ff5555; }
        .status-terminal .warn { color:var(--warn); }
        .status-terminal .dim  { color:var(--muted); }
        .file-list { font-family:var(--mono); font-size:10px; color:var(--muted); max-height:80px; overflow-y:auto; padding:4px 0; }
        .file-list div { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.03); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .file-list-empty { font-style:italic; color:#2a2a3a; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    </style>
</head>
<body>
<div class="topbar">
    <div class="topbar-logo">WIN16<span>/DEV</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-badge">BC++ 4.0 · Win 3.1</div>
</div>
<div class="workspace">
    <div id="dos-container">
        <div id="boot-overlay">
            <div class="boot-title">Initialising Environment</div>
            <div class="boot-progress-wrap">
                <div class="boot-progress-label"><span id="prog-stage">Standby</span><span id="prog-pct">0%</span></div>
                <div class="boot-progress-bar"><div class="boot-progress-fill" id="prog-fill"></div></div>
            </div>
            <div class="boot-log" id="boot-log">—</div>
        </div>
    </div>
    <div class="sidebar">
        <div class="panel">
            <div class="panel-title">Import</div>
            <p>Upload a ZIP of source files (.c, .h, .mak…). They will be written into C:\SRC\ on the DOS filesystem.</p>
            <div class="drop-zone" id="dropZone">
                <input type="file" id="uploadZip" accept=".zip" onchange="handleFileSelect(event)">
                <span class="drop-zone-icon">📦</span>
                <span class="drop-zone-label">Drop ZIP or click to browse</span>
            </div>
            <div class="file-list" id="fileList"><div class="file-list-empty">No files staged</div></div>
        </div>
        <div class="panel">
            <div class="panel-title">Actions</div>
            <button class="btn" id="importBtn" onclick="importFiles()" disabled><span class="btn-dot"></span>Import to C:\SRC\</button>
            <button class="btn" id="exportBtn" onclick="exportFiles()" disabled><span class="btn-dot warn"></span>Export C:\EXPORT\</button>
        </div>
        <div class="panel" style="flex:1">
            <div class="panel-title">Log</div>
            <div class="status-terminal" id="status"></div>
        </div>
    </div>
</div>
<script>
'use strict';

let dosInstance = null;
let stagedFiles = {};
const statusEl  = document.getElementById('status');
const importBtn = document.getElementById('importBtn');
const exportBtn = document.getElementById('exportBtn');
const fileList  = document.getElementById('fileList');

function log(msg, cls) {
    const d = document.createElement('div');
    if (cls) d.className = cls;
    d.textContent = msg;
    statusEl.appendChild(d);
    statusEl.scrollTop = statusEl.scrollHeight;
    console.log('[win16]', msg);
}

function setProgress(stage, pct) {
    document.getElementById('prog-stage').textContent = stage;
    document.getElementById('prog-pct').textContent   = pct + '%';
    document.getElementById('prog-fill').style.width  = pct + '%';
    document.getElementById('boot-log').textContent   = stage;
}

async function fetchPart(url, label, pStart, pEnd) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' fetching ' + url);
    const total = parseInt(resp.headers.get('Content-Length') || '0');
    const reader = resp.body.getReader();
    const chunks = [];
    let loaded = 0;
    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total) setProgress(label, Math.round(pStart + (loaded / total) * (pEnd - pStart)));
    }
    const out = new Uint8Array(loaded);
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    log(label + ': ' + (loaded/1024/1024).toFixed(2) + ' MB', 'ok');
    return out;
}

async function boot() {
    log('Starting…', 'dim');
    try {
        const part1 = await fetchPart('win31.img.gz.aa', 'Part 1', 2, 30);
        const part2 = await fetchPart('win31.img.gz.ab', 'Part 2', 30, 55);

        setProgress('Reassembling', 56);
        const combined = new Uint8Array(part1.length + part2.length);
        combined.set(part1, 0);
        combined.set(part2, part1.length);
        if (combined[0] !== 0x1f || combined[1] !== 0x8b)
            throw new Error('Bad gzip header');

        setProgress('Decompressing', 58);
        log('Decompressing…', 'dim');
        await new Promise(r => setTimeout(r, 30));
        const decompressed = pako.inflate(combined);
        log('Decompressed: ' + (decompressed.length/1024/1024).toFixed(0) + ' MB', 'ok');

        setProgress('Building bundle', 60);
        log('Building bundle…', 'dim');
        await new Promise(r => setTimeout(r, 30));

        // js-dos v8 bundle format:
        //   jsdos.json        — metadata, must have "version":"8"
        //   dosbox.conf       — DOSBox config read by the emulator
        //   hdd.img           — disk image, available in FS root during autoexec
        //
        // The v8 worker iframe issue happens when Dos() is called with a div
        // AND no workerUrl — it uses window.location as the worker, which
        // re-loads our page. Fix: pass a dedicated workerUrl from the CDN.

        // Keep the bundle tiny — just config, no disk image.
        // Transferring 504 MB to a worker via postMessage stalls indefinitely.
        // Instead we write hdd.img into the FS via ci.fs after onRun fires,
        // then drive the mount+boot sequence via ci.shell() commands.
        const dosboxConf = [
            "[dosbox]",
            "machine=svga_s3",
            "memsize=16",
            "",
            "[cpu]",
            "cputype=386",
            "cycles=25000",
            "",
            "[dos]",
            "xms=true",
            "ems=true",
            "umb=true",
            "",
            "[sblaster]",
            "sbtype=sb16",
            "sbbase=220",
            "irq=7",
            "dma=1",
            "hdma=5",
            "oplmode=auto",
            "",
            "[autoexec]",
            "@echo off",
            "echo Mounting disk image...",
            "imgmount c hdd.img -t hdd -fs fat",
            "c:",
            "cd windows",
            "win.com"
        ].join("\r\n");

        // v8 bundle format: config files must be in the .jsdos/ subdirectory
        const zip = new JSZip();
        zip.file(".jsdos/jsdos.json",  JSON.stringify({ version: "8", emulatorVersion: "8" }));
        zip.file(".jsdos/dosbox.conf", dosboxConf);

        const bundleBytes = await zip.generateAsync({ type: "uint8array", compression: "DEFLATE" });
        const bundleBlob  = new Blob([bundleBytes], { type: "application/zip" });
        const bundleUrl  = URL.createObjectURL(bundleBlob);
        log('Bundle: ' + (bundleBlob.size/1024).toFixed(1) + ' KB → ' + bundleUrl, 'ok');

        setProgress('Starting emulator', 93);
        await new Promise(r => setTimeout(r, 100));

        if (typeof Dos === 'undefined') throw new Error('js-dos failed to load');

        const canvas = document.createElement('canvas');
        canvas.style.cssText = 'width:100%;height:100%;display:block;';
        document.getElementById('dos-container').appendChild(canvas);

        // Official v8 API: onEvent callback in Dos() options.
        // "ci-ready" event delivers the CommandInterface (ci).
        // CI FS methods: ci.fsWriteFile(path, uint8), ci.fsReadFile(path), ci.fsTree()
        // CI shell: ci.shell(command)
        // After writing files, must remount the drive to see changes.
        log('Starting DOSBox with onEvent handler…', 'dim');

        const realCI = await new Promise(function(resolve, reject) {
            try {
                Dos(canvas, {
                    url: bundleUrl,
                    workerUrl: 'https://v8.js-dos.com/latest/js-dos-worker.js',
                    noCacheDb: true,
                    noCloud: true,
                    autoStart: true,
                    // initFs injects files into the FS before autoexec runs
                    initFs: [{ path: "hdd.img", contents: decompressed }],
                    onEvent: function(event, arg) {
                        log('DosEvent: ' + event, 'dim');
                        if (event === 'ci-ready') {
                            resolve(arg);
                        }
                    }
                });
            } catch(e) {
                reject(e);
            }
        });

        dosInstance = realCI;
        log('DOSBox running — Windows should be booting', 'ok');
        // hdd.img was injected via initFs before autoexec ran.
        // The autoexec handles: imgmount c hdd.img → c: → cd windows → win.com

        setProgress('Running', 100);
        document.getElementById('boot-overlay').classList.add('hidden');
        importBtn.disabled = false;
        exportBtn.disabled = false;



    } catch (err) {
        log('FAILED: ' + err.message, 'err');
        console.error(err);
        document.getElementById('boot-log').textContent = 'Failed: ' + err.message;
    }
}

function handleFileSelect(evt) { const f = evt.target.files[0]; if (f) stageZip(f); }
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  function(e) { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', function()  { dz.classList.remove('drag-over'); });
dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('drag-over'); var f = e.dataTransfer.files[0]; if (f) stageZip(f); });

async function stageZip(file) {
    stagedFiles = {};
    try {
        const zip = await (new JSZip()).loadAsync(file);
        const ps = [];
        zip.forEach(function(path, entry) { if (!entry.dir) ps.push(entry.async('uint8array').then(function(d) { stagedFiles[path] = d; })); });
        await Promise.all(ps);
        const keys = Object.keys(stagedFiles);
        fileList.innerHTML = keys.length ? keys.map(function(p) { return '<div title="'+p+'">· '+p+'</div>'; }).join('') : '<div class="file-list-empty">Empty ZIP</div>';
        importBtn.disabled = !dosInstance;
        log('Staged ' + keys.length + ' file(s)', 'ok');
    } catch(e) { log('ZIP error: ' + e.message, 'err'); }
}

async function importFiles() {
    if (!dosInstance) return;
    var ok = 0, fail = 0;
    for (const [path, data] of Object.entries(stagedFiles)) {
        // fsWriteFile paths are relative to DOSBox root (no drive letter)
        const dosPath = 'c/src/' + path.replace(/\\/g, '/').replace(/^\//, '');
        try { await dosInstance.fsWriteFile(dosPath, data); ok++; }
        catch(e) { log('x ' + path + ': ' + e.message, 'err'); fail++; }
    }
    log('Import: ' + ok + ' ok, ' + fail + ' failed', ok ? 'ok' : 'err');
}

async function exportFiles() {
    if (!dosInstance) return;
    exportBtn.disabled = true;
    try {
        // fsTree() returns the full FS structure; find c/export files
        const tree = await dosInstance.fsTree();
        // Navigate to c/export
        const cDrive = tree.nodes && tree.nodes.find(n => n.name.toLowerCase() === 'c');
        const exportDir = cDrive && cDrive.nodes && cDrive.nodes.find(n => n.name.toUpperCase() === 'EXPORT');
        if (!exportDir || !exportDir.nodes || !exportDir.nodes.length) {
            log('C:\EXPORT\ empty or not found', 'warn'); exportBtn.disabled = false; return;
        }
        const zip = new JSZip();
        for (const e of exportDir.nodes) {
            if (e.size === null) continue; // directory
            const data = await dosInstance.fsReadFile('c/export/' + e.name);
            zip.file(e.name, data);
        }
        const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'win16_export.zip'; a.click();
        URL.revokeObjectURL(a.href);
        log('Exported ' + exportDir.nodes.length + ' file(s)', 'ok');
    } catch(e) { log('Export error: ' + e.message, 'err'); }
    exportBtn.disabled = false;
}

boot();
</script>
</body>
</html>
